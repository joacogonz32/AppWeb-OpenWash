#
# Este archivo documenta todas las queries y mutations del conector de Data Connect
# para el proyecto OpenWash. Reemplaza el conector de ejemplo en dataconnect/example/.
# El conector de producción se ubicará en dataconnect/connector/
# (queries.gql y mutations.gql separados).
#
# Trazabilidad completa:
#   Queries   → FR-006, FR-018, FR-019, FR-020, FR-026, FR-027, FR-030, FR-031
#   Mutations → FR-001, FR-007, FR-008, FR-009, FR-010, FR-011, FR-014,
#               FR-016, FR-021, FR-022, FR-023, FR-024, FR-028, FR-029
